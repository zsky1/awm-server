server:
  port: 8080

spring:
  application:
    name: awm-server
  datasource:
    url: jdbc:postgresql://localhost:5432/awm
    username: awm
    password: awm123
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid

ai:
  llm:
    provider: deepseek
    api-key: ${AI_API_KEY:sk-placeholder}
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
    max-tokens: 4096
    temperature: 0.7
  embedding:
    provider: deepseek
    api-key: ${AI_API_KEY:sk-placeholder}
    base-url: https://api.deepseek.com/v1
    model: deepseek-embedding

qdrant:
  host: localhost
  port: 6333

minio:
  endpoint: http://localhost:9000
  access-key: awm
  secret-key: awm123456
  bucket: awm

logging:
  level:
    com.awm: DEBUG
